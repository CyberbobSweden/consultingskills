<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konsultrollen i praktiken – Enhetsträff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#0F6E56,#185FA5);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header h1{font-size:20px;font-weight:500;color:white;margin:0}
.header .sub{font-size:12px;opacity:.75;margin-top:3px;color:white}
.mode-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mbtn{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.45);background:transparent;color:white;font-size:12px;cursor:pointer;transition:all .15s}
.mbtn.active{background:white;color:#0F6E56;font-weight:500}
.tbar{background:rgba(15,110,86,0.92);padding:.75rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.tdisp{font-size:28px;font-weight:700;color:white;min-width:72px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.tdisp.warn{color:#FFD166}
.tdisp.crit{color:#FF6B6B;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.phase-time-row{display:flex;gap:12px;flex-wrap:wrap;flex:1}
.ptime-chip{background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;min-width:64px}
.ptime-chip.active-phase{background:rgba(255,255,255,.35);font-weight:600}
.ptime-chip span{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.tctrl{display:flex;gap:5px;align-items:center}
.tbtn{padding:5px 13px;border-radius:6px;border:1px solid rgba(255,255,255,0.35);background:transparent;color:white;font-size:12px;cursor:pointer}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tbtn.primary{background:rgba(255,255,255,.25)}
.pbar{height:5px;background:#0a4a38;position:relative}
.pfill{height:100%;background:#5DCAA5;transition:width .5s}
.content{padding:1.5rem 2rem;max-width:920px;margin:0 auto}
.pnav{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.ppill{padding:5px 14px;border-radius:20px;border:1px solid #ddd;background:white;font-size:12px;cursor:pointer;white-space:nowrap;color:#666;transition:all .15s}
.ppill.active{background:#0F6E56;color:white;border-color:#0F6E56}
.ppill.done::after{content:" ✓"}
.card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ctitle{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:.2rem;display:flex;align-items:center;gap:7px}
.csub{font-size:12px;color:#888;margin-bottom:.9rem}
.qbox{background:#f7f7f4;border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.6rem;border-left:3px solid #0F6E56}
.qbox h4{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:.3rem}
.qbox p{font-size:13px;color:#333;line-height:1.6}
.qbox.blue{border-left-color:#185FA5}
.qbox.blue h4{color:#185FA5}
.qbox.orange{border-left-color:#E07B39}
.qbox.orange h4{color:#E07B39}
.fnote{background:#e8f2fb;border-radius:8px;padding:.65rem 1rem;font-size:12px;color:#0C447C;margin-bottom:.85rem;border-left:3px solid #185FA5;line-height:1.5}
.ins{background:#e8f5ef;border-radius:8px;padding:.7rem 1rem;margin-bottom:.6rem}
.ibadge{display:inline-block;background:white;color:#085041;font-size:11px;padding:3px 9px;border-radius:10px;margin:.15rem;border:1px solid #9FE1CB}
textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:.65rem;font-size:13px;min-height:80px;resize:vertical;background:white;color:#1a1a1a;font-family:inherit;margin-top:.4rem}
textarea:focus{outline:none;border-color:#0F6E56;box-shadow:0 0 0 2px rgba(15,110,86,.1)}
.sbtn{padding:7px 18px;background:#0F6E56;color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500}
.sbtn:hover{background:#085041}
.sbtn:disabled{background:#aaa;cursor:default}
.stag{font-size:12px;color:#0F6E56;margin-left:8px;opacity:0;transition:opacity .3s}
.stag.show{opacity:1}
.slabel{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem;margin-top:.7rem}
.ansgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.75rem}
.ansitem{background:#f7f7f4;border-radius:8px;padding:.65rem .9rem;font-size:13px;border:1px solid #e8e8e4}
.ansgrp{font-size:11px;color:#999;margin-bottom:.2rem;font-weight:600}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl td{padding:.45rem .7rem;border-bottom:1px solid #f0f0ec;vertical-align:top}
.stbl td:first-child{color:#888;width:120px;font-weight:500}
.expbtn{padding:7px 16px;border:1px solid #0F6E56;border-radius:7px;background:white;color:#0F6E56;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.expbtn:hover{background:#e8f5ef}
.nextbtn{padding:7px 16px;border:1px solid #ddd;border-radius:7px;background:white;color:#333;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.nextbtn:hover{background:#f5f5f2}
/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:white;border-radius:16px;padding:2rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.18);text-align:center}
.modal h2{font-size:17px;font-weight:600;margin-bottom:.4rem}
.modal p{font-size:13px;color:#888;margin-bottom:1.25rem;line-height:1.5}
.modal input[type=password],.modal input[type=text],.modal input[type=number]{width:100%;border:1px solid #ddd;border-radius:8px;padding:.65rem;font-size:14px;text-align:center;margin-bottom:.6rem}
.modal input:focus{outline:none;border-color:#0F6E56}
.merr{font-size:12px;color:#c0392b;min-height:16px;margin-bottom:.4rem}
.lbtn{width:100%;padding:9px;background:#0F6E56;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:.4rem}
.lbtn:hover{background:#085041}
.cancel-link{font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline}
/* group entry */
.entry-code{display:flex;gap:6px;justify-content:center;margin-bottom:.75rem}
.entry-code input{width:52px;height:56px;border:2px solid #ddd;border-radius:10px;font-size:24px;text-align:center;font-weight:700;color:#0F6E56}
.entry-code input:focus{outline:none;border-color:#0F6E56}
.grp-select{display:flex;gap:8px;flex-wrap:wrap;margin:.75rem 0}
.grp-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #ddd;background:white;font-size:13px;cursor:pointer;color:#555;transition:all .15s}
.grp-btn.sel{background:#0F6E56;color:white;border-color:#0F6E56;font-weight:500}
.live-badge{display:inline-block;width:8px;height:8px;background:#2ecc71;border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-note{font-size:11px;color:#aaa;margin-left:4px}
/* admin time editor */
.time-editor{display:flex;flex-direction:column;gap:.5rem}
.time-row{display:flex;align-items:center;gap:.5rem;justify-content:space-between}
.time-row label{font-size:13px;color:#333;flex:1}
.time-row input[type=number]{width:64px;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:13px;text-align:center}
/* qr */
.qr-wrap{text-align:center;padding:.75rem 0}
.qr-wrap p{font-size:13px;color:#555;margin-bottom:.75rem}
#qrcode{display:inline-block;padding:12px;background:white;border:1px solid #ddd;border-radius:10px}
.qr-url{font-size:11px;color:#aaa;margin-top:.5rem;word-break:break-all}
@media(max-width:600px){.ansgrid{grid-template-columns:1fr}.content{padding:1rem}.header{padding:1rem}.tdisp{font-size:22px}}
</style>
</head>
<body>

<!-- Modals -->
<div class="overlay" id="loginOverlay" style="display:none">
  <div class="modal">
    <h2>Facilitatorvy</h2>
    <p>Ange lösenord</p>
    <input type="password" id="pwInput" placeholder="Lösenord" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="merr" id="pwErr"></div>
    <button class="lbtn" onclick="checkPw()">Logga in</button>
    <div class="cancel-link" onclick="closeModal('loginOverlay')">Avbryt</div>
  </div>
</div>

<div class="overlay" id="timeOverlay" style="display:none">
  <div class="modal">
    <h2>⏱ Justera tider</h2>
    <p>Ange antal minuter per del (totalt visas automatiskt)</p>
    <div class="time-editor" id="timeEditor"></div>
    <div style="margin-top:1rem;font-size:13px;color:#555">Totalt: <strong id="totalMins">0</strong> min</div>
    <button class="lbtn" style="margin-top:1rem" onclick="applyTimes()">Spara &amp; stäng</button>
    <div class="cancel-link" onclick="closeModal('timeOverlay')">Avbryt</div>
  </div>
</div>

<div class="overlay" id="groupOverlay" style="display:none">
  <div class="modal">
    <h2>Välkommen!</h2>
    <p>Ange åtkomstkoden för att gå med i grupparbetet</p>
    <div class="entry-code" id="codeInputs"></div>
    <div class="merr" id="codeErr"></div>
    <div id="groupPickerInModal" style="display:none">
      <p style="font-size:13px;color:#333;margin-bottom:.5rem">Välj din grupp:</p>
      <div class="grp-select" id="grpBtns"></div>
    </div>
    <button class="lbtn" id="codeBtn" onclick="checkCode()">Fortsätt</button>
    <div class="cancel-link" onclick="closeModal('groupOverlay')">Avbryt</div>
  </div>
</div>

<div class="header">
  <div>
    <h1>Konsultrollen i praktiken</h1>
    <div class="sub">Enhetsträff · arbetspass</div>
  </div>
  <div class="mode-btns">
    <button class="mbtn" id="btnFac" onclick="tryFac()">🔒 Facilitator</button>
    <button class="mbtn active" id="btnGrp" onclick="tryGrp()">Gruppvy</button>
    <button class="mbtn" id="btnSum" onclick="trySum()">Summering</button>
  </div>
</div>

<div class="tbar">
  <div id="tdisp" class="tdisp">—:——</div>
  <div class="phase-time-row" id="phaseTimeRow"></div>
  <div class="tctrl">
    <button class="tbtn primary" onclick="startT()">▶ Start</button>
    <button class="tbtn" onclick="pauseT()">⏸</button>
    <button class="tbtn" onclick="resetT()">↺</button>
    <button class="tbtn" onclick="openTimeEditor()" title="Justera tider">⚙️</button>
  </div>
</div>
<div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>

<div class="content" id="mc"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyAo_k0g2ee6utvUYxi8p5xp_HWidXTei8A",authDomain:"consultingskills-938d9.firebaseapp.com",projectId:"consultingskills-938d9",storageBucket:"consultingskills-938d9.firebasestorage.app",messagingSenderId:"250530809846",appId:"1:250530809846:web:eacdb035347952c595e9d7"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const SESSION="enhetsträff-2026";
window.fbSave=async(del,group,text)=>{try{await setDoc(doc(db,SESSION,del+'_'+group),{text,group,del,ts:Date.now()},{merge:true});}catch(e){console.error(e);}};
window.fbListen=(cb)=>{onSnapshot(collection(db,SESSION),(snap)=>{const d={};snap.forEach(s=>{d[s.id]=s.data().text||'';});cb(d);});};
window.fbReady=true;
window.dispatchEvent(new Event('fbReady'));
</script>

<script>
const PASS='cyberbob';
const JOIN_CODE='1234'; // 4-digit code for participants
const GROUPS=['Grupp 1','Grupp 2','Grupp 3','Grupp 4','Grupp 5'];

// Default phase minutes – editable
let PHASE_MINS=[10,20,20,20,15,5];
const PHASE_LABELS=['Intro','Del 1 – Skills','Del 2 – Varumärke','Del 3 – Obelagd tid','Del 4 – Hattar','Avslut'];

let totalSecs=()=>PHASE_MINS.reduce((a,b)=>a+b,0)*60;
let secs=totalSecs(),running=false,iv=null;
let mode='grp',phase=0,isAuth=false,done={};
let ans={},selectedGroup=localStorage.getItem('sg')||'',groupUnlocked=localStorage.getItem('gu')==='1';

window.addEventListener('fbReady',()=>{ window.fbListen(d=>{ans=d;render();}); });

// ---- MODALS ----
function closeModal(id){document.getElementById(id).style.display='none';}
function tryFac(){document.getElementById('loginOverlay').style.display='flex';setTimeout(()=>document.getElementById('pwInput').focus(),100);}
function checkPw(){
  if(document.getElementById('pwInput').value===PASS){isAuth=true;closeModal('loginOverlay');document.getElementById('pwInput').value='';setMode('fac');}
  else{document.getElementById('pwErr').textContent='Fel lösenord';document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();}
}
function trySum(){if(isAuth)setMode('sum');else tryFac();}
function tryGrp(){
  if(groupUnlocked){setMode('grp');}
  else{openGroupOverlay();}
}
function openGroupOverlay(){
  const ci=document.getElementById('codeInputs');
  ci.innerHTML='';
  for(let i=0;i<4;i++){
    const inp=document.createElement('input');
    inp.type='text';inp.maxLength=1;inp.inputMode='numeric';inp.id='ci'+i;
    inp.addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/,'');if(e.target.value&&i<3)document.getElementById('ci'+(i+1)).focus();});
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)document.getElementById('ci'+(i-1)).focus();});
    ci.appendChild(inp);
  }
  document.getElementById('codeErr').textContent='';
  document.getElementById('groupPickerInModal').style.display='none';
  document.getElementById('codeBtn').textContent='Fortsätt';
  document.getElementById('groupOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('ci0').focus(),100);
}
function checkCode(){
  const code=['ci0','ci1','ci2','ci3'].map(id=>document.getElementById(id).value).join('');
  if(code===JOIN_CODE){
    document.getElementById('codeErr').textContent='';
    document.getElementById('groupPickerInModal').style.display='block';
    const gb=document.getElementById('grpBtns');
    gb.innerHTML=GROUPS.map(g=>`<button class="grp-btn ${selectedGroup===g?'sel':''}" onclick="pickGroup('${g}')">${g}</button>`).join('');
    document.getElementById('codeBtn').textContent='Gå in';
    document.getElementById('codeBtn').onclick=confirmGroup;
  } else {
    document.getElementById('codeErr').textContent='Fel kod – försök igen';
    ['ci0','ci1','ci2','ci3'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('ci0').focus();
  }
}
function pickGroup(g){
  selectedGroup=g;
  document.querySelectorAll('.grp-btn').forEach(b=>b.classList.toggle('sel',b.textContent===g));
}
function confirmGroup(){
  if(!selectedGroup){document.getElementById('codeErr').textContent='Välj en grupp';return;}
  groupUnlocked=true;
  localStorage.setItem('sg',selectedGroup);
  localStorage.setItem('gu','1');
  closeModal('groupOverlay');
  setMode('grp');
}

// ---- TIME EDITOR ----
function openTimeEditor(){
  const ed=document.getElementById('timeEditor');
  ed.innerHTML=PHASE_LABELS.map((l,i)=>`
    <div class="time-row">
      <label>${l}</label>
      <input type="number" id="te${i}" min="1" max="60" value="${PHASE_MINS[i]}"> min
    </div>`).join('');
  updateTotalMins();
  PHASE_LABELS.forEach((_,i)=>document.getElementById('te'+i).addEventListener('input',updateTotalMins));
  document.getElementById('timeOverlay').style.display='flex';
}
function updateTotalMins(){
  let t=0;
  PHASE_LABELS.forEach((_,i)=>{t+=parseInt(document.getElementById('te'+i).value)||0;});
  document.getElementById('totalMins').textContent=t;
}
function applyTimes(){
  PHASE_LABELS.forEach((_,i)=>{PHASE_MINS[i]=parseInt(document.getElementById('te'+i).value)||PHASE_MINS[i];});
  secs=totalSecs();running=false;clearInterval(iv);
  upd();renderPhaseChips();
  closeModal('timeOverlay');
}

// ---- TIMER ----
function startT(){if(running)return;running=true;iv=setInterval(()=>{if(secs>0){secs--;upd();}else{clearInterval(iv);running=false;}},1000);}
function pauseT(){clearInterval(iv);running=false;}
function resetT(){clearInterval(iv);running=false;secs=totalSecs();upd();}
function upd(){
  const tot=totalSecs();
  const m=Math.floor(secs/60),s=secs%60;
  const el=document.getElementById('tdisp');
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  el.className='tdisp'+(secs<300?' crit':secs<600?' warn':'');
  document.getElementById('pfill').style.width=`${((tot-secs)/tot*100).toFixed(1)}%`;
  renderPhaseChips();
}
function renderPhaseChips(){
  const tot=totalSecs();
  const elapsed=tot-secs;
  let cum=0;
  const row=document.getElementById('phaseTimeRow');
  if(!row)return;
  row.innerHTML=PHASE_LABELS.map((l,i)=>{
    const start=cum*60;
    cum+=PHASE_MINS[i];
    const end=cum*60;
    const isActive=elapsed>=start&&elapsed<end;
    const remSecs=Math.max(0,end-elapsed);
    const rm=Math.floor(remSecs/60),rs=remSecs%60;
    return `<div class="ptime-chip ${isActive?'active-phase':''}">
      <span>${isActive?rm+':'+rs.toString().padStart(2,'0'):PHASE_MINS[i]+'m'}</span>
      <span style="font-size:10px;opacity:.8">${l}</span>
    </div>`;
  }).join('');
}

// ---- MODE ----
function setMode(m){
  mode=m;
  ['fac','grp','sum'].forEach((v,i)=>{
    const b=document.getElementById(['btnFac','btnGrp','btnSum'][i]);
    b.classList.toggle('active',v===m);
  });
  document.getElementById('btnFac').textContent=isAuth?'✓ Facilitator':'🔒 Facilitator';
  render();
}
function go(i){phase=Math.max(0,Math.min(i,PHASE_LABELS.length-1));renderPhaseChips();render();}
function ga(k){return ans[k]||'';}

async function groupSubmit(del,group,inputId,btnId,tagId){
  const val=document.getElementById(inputId).value;
  if(!val.trim())return;
  const btn=document.getElementById(btnId);
  btn.disabled=true;btn.textContent='Sparar…';
  await window.fbSave(del,group,val);
  btn.textContent='Skickat!';
  const tag=document.getElementById(tagId);
  if(tag){tag.classList.add('show');setTimeout(()=>tag.classList.remove('show'),2500);}
}

// ---- RENDER ----
function render(){
  const c=document.getElementById('mc');
  if(mode==='fac') c.innerHTML=renderFac();
  else if(mode==='grp') c.innerHTML=renderGrp();
  else c.innerHTML=renderSum();
  if(mode==='grp'&&phase===0)generateQR();
  renderPhaseChips();
}

function phaseNav(){
  return `<div class="pnav">${PHASE_LABELS.map((l,i)=>`<div class="ppill ${i===phase?'active':done[i]?'done':''}" onclick="go(${i})">${l} <span style="opacity:.5;font-size:11px">${PHASE_MINS[i]}m</span></div>`).join('')}</div>`;
}

function facGroupView(key){
  return GROUPS.map(g=>{
    const val=ga(key+'_'+g);
    return `<div style="margin-bottom:.7rem">
      <div class="slabel">${g} ${val?'<span style="color:#0F6E56;font-size:11px">✓ svar inkommet</span>':''}</div>
      <div style="background:#f7f7f4;border-radius:8px;padding:.65rem;font-size:13px;min-height:44px;border:1px solid #eee;color:${val?'#1a1a1a':'#bbb'}">${val||'Inväntar svar…'}</div>
    </div>`;
  }).join('');
}

function groupAnswerBox(key){
  if(!selectedGroup) return '';
  const existing=ga(key+'_'+selectedGroup);
  const iid=`gi_${key}`,bid=`gb_${key}`,tid=`gt_${key}`;
  return `<div class="card" style="border:1.5px solid #0F6E56">
    <div class="ctitle"><span class="live-badge"></span>${selectedGroup} – ert svar</div>
    <div class="csub">Skriv ert svar här – det syns direkt hos facilitatorn</div>
    <textarea id="${iid}" placeholder="Skriv gruppens viktigaste punkter…">${existing}</textarea>
    <div style="display:flex;align-items:center;gap:.75rem;margin-top:.5rem">
      <button class="sbtn" id="${bid}" onclick="groupSubmit('${key}','${selectedGroup}','${iid}','${bid}','${tid}')">Skicka svar</button>
      <span class="stag" id="${tid}">✓ Skickat!</span>
    </div>
  </div>`;
}

function renderFac(){
  if(phase===0) return phaseNav()+renderIntro();
  if(phase>=1&&phase<=4) return phaseNav()+renderDel(phase,true);
  return phaseNav()+renderAvsl();
}
function renderGrp(){
  if(phase===0) return renderWelcome();
  if(phase>=1&&phase<=4) return renderDel(phase,false);
  return `<div class="card"><div class="empty">Passet är slut – tack för idag! 🎉</div></div>`;
}

function renderWelcome(){
  return `<div class="card" style="text-align:center;padding:2rem">
    <div class="ctitle" style="justify-content:center;font-size:18px;margin-bottom:.5rem">Välkommen!</div>
    <p style="font-size:13px;color:#666;margin-bottom:1.5rem">Passet startar strax. Sätt dig i din grupp och vänta på facilitatorn.</p>
    <div class="qr-wrap">

function generateQR(){
  setTimeout(()=>{
    const el=document.getElementById('qrcode'),urlEl=document.getElementById('qrurl');
    if(!el)return;
    const url=window.location.href.split('?')[0];
    if(urlEl)urlEl.textContent=url;
    el.innerHTML='';
    try{new QRCode(el,{text:url,width:160,height:160,colorDark:'#0F6E56',colorLight:'#ffffff'});}
    catch(e){el.textContent=url;}
  },200);
}

function renderDel(n,isFac){
  const d=DEFS[n];
  const key='d'+n;
  const qs=d.questions.map(([h,p])=>`<div class="qbox"><h4>${h}</h4><p>${p}</p></div>`).join('');
  const deliverable=`<div class="qbox blue"><h4>Leverans till gruppen</h4><p>${d.deliverable}</p></div>`;
  const extra=d.extraNote&&isFac?`<div class="fnote">${d.extraNote}</div>`:'';

  const groupInput=!isFac?groupAnswerBox(key):'';

  const facView=isFac?`
    <div class="card">
      <div class="ctitle">Seniora insikter – lyft vid behov</div>
      <div class="ins">${d.insights.map(i=>`<span class="ibadge">${i}</span>`).join('')}</div>
    </div>
    <div class="card">
      <div class="ctitle"><span class="live-badge"></span>Inkomna svar <span class="sync-note">live</span></div>
      ${facGroupView(key)}
      <div style="margin-top:1rem"><button class="sbtn" onclick="done[${n}]=true;go(${n+1})">Gå vidare →</button></div>
    </div>`:'';

  return `<div class="card">
    <div class="ctitle">${d.title}</div>
    <div class="csub">${d.time}</div>
    ${qs}${deliverable}
  </div>
  ${extra}
  ${groupInput}
  ${facView}`;
}

function renderSum(){
  const parts=[{id:'d1',label:'Del 1 · Core Consulting Skills'},{id:'d2',label:'Del 2 · Konsultmässighet'},{id:'d3',label:'Del 3 · Obelagd tid & tidrapportering'},{id:'d4',label:'Del 4 · Scenario – Många hattar'}];
  const hasAny=parts.some(p=>GROUPS.some(g=>ans[p.id+'_'+g]));
  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:.75rem"><button class="expbtn" onclick="exportAnswers()">⬇ Exportera (.txt)</button></div>`;
  if(!hasAny) return html+`<div class="card"><div class="empty">Inga svar inkomna ännu.</div></div>`;
  parts.forEach(p=>{
    const filled=GROUPS.filter(g=>ans[p.id+'_'+g]);
    if(!filled.length)return;
    html+=`<div class="card"><div class="ctitle"><span class="live-badge"></span>${p.label}</div><div class="ansgrid">`;
    filled.forEach(g=>{html+=`<div class="ansitem"><div class="ansgrp">${g}</div>${ans[p.id+'_'+g]}</div>`;});
    html+=`</div></div>`;
  });
  return html;
}

function exportAnswers(){
  const parts=[{id:'d1',label:'Del 1 · Core Consulting Skills'},{id:'d2',label:'Del 2 · Konsultmässighet'},{id:'d3',label:'Del 3 · Obelagd tid & tidrapportering'},{id:'d4',label:'Del 4 · Scenario'}];
  let txt='WORKSHOP – Konsultrollen i praktiken\nEnhetsträff · '+new Date().toLocaleDateString('sv-SE')+'\n'+'='.repeat(40)+'\n\n';
  parts.forEach(p=>{
    txt+=p.label+'\n'+'-'.repeat(30)+'\n';
    GROUPS.forEach(g=>{if(ans[p.id+'_'+g])txt+=g+': '+ans[p.id+'_'+g]+'\n';});
    txt+='\n';
  });
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='workshop-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
}
