<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konsultrollen i praktiken – Enhetsträff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#0F6E56,#185FA5);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.header h1{font-size:19px;font-weight:500;color:white;margin:0}
.header .sub{font-size:12px;opacity:.75;margin-top:2px;color:white}
.mode-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mbtn{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.45);background:transparent;color:white;font-size:12px;cursor:pointer;transition:all .15s}
.mbtn.active{background:white;color:#0F6E56;font-weight:500}
.qrbtn{padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.45);background:transparent;color:white;font-size:12px;cursor:pointer;display:none}
.qrbtn.show{display:inline-block}
.qrbtn:hover{background:rgba(255,255,255,.2)}
.tbar{background:rgba(15,110,86,0.92);padding:.65rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.tdisp{font-size:26px;font-weight:700;color:white;min-width:68px;font-variant-numeric:tabular-nums}
.tdisp.warn{color:#FFD166}
.tdisp.crit{color:#FF6B6B;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.phase-time-row{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.ptime-chip{background:rgba(255,255,255,.15);border-radius:8px;padding:4px 9px;font-size:10px;color:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;min-width:56px}
.ptime-chip.active-phase{background:rgba(255,255,255,.35);font-weight:600}
.ptime-chip span{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.tctrl{display:flex;gap:5px;align-items:center}
.tbtn{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.35);background:transparent;color:white;font-size:12px;cursor:pointer}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tbtn.primary{background:rgba(255,255,255,.25)}
.pbar{height:4px;background:#0a4a38}
.pfill{height:100%;background:#5DCAA5;transition:width .5s}
.content{padding:1.25rem 2rem;max-width:900px;margin:0 auto}
.pnav{display:flex;gap:6px;margin-bottom:1.1rem;overflow-x:auto;padding-bottom:4px}
.ppill{padding:5px 13px;border-radius:20px;border:1px solid #ddd;background:white;font-size:12px;cursor:pointer;white-space:nowrap;color:#666;transition:all .15s}
.ppill.active{background:#0F6E56;color:white;border-color:#0F6E56}
.ppill.done::after{content:" ✓"}
.card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ctitle{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:.2rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.csub{font-size:12px;color:#888;margin-bottom:.85rem}
.qblock{background:#f7f7f4;border-radius:10px;padding:.85rem 1.1rem;margin-bottom:.7rem;border-left:3px solid #0F6E56}
.qblock h4{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:.3rem}
.qblock p{font-size:13px;color:#333;line-height:1.6;margin-bottom:.6rem}
.delivblock{background:#EBF4FF;border-radius:10px;padding:.85rem 1.1rem;margin-top:1.1rem;border:2px solid #185FA5}
.delivblock h4{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.3rem}
.delivblock p{font-size:13px;color:#333;line-height:1.6;margin-bottom:.6rem}
textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:.6rem;font-size:13px;min-height:68px;resize:vertical;background:white;color:#1a1a1a;font-family:inherit}
textarea:focus{outline:none;border-color:#0F6E56;box-shadow:0 0 0 2px rgba(15,110,86,.1)}
.delivblock textarea{border-color:#185FA5}
.delivblock textarea:focus{box-shadow:0 0 0 2px rgba(24,95,165,.15)}
.send-row{display:flex;align-items:center;gap:.75rem;margin-top:.5rem}
.sbtn{padding:6px 16px;background:#0F6E56;color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500}
.sbtn:hover{background:#085041}
.sbtn:disabled{background:#aaa;cursor:default}
.dbtn{padding:6px 16px;background:#185FA5;color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500}
.dbtn:hover{background:#0e4070}
.dbtn:disabled{background:#aaa;cursor:default}
.stag{font-size:12px;color:#0F6E56;opacity:0;transition:opacity .3s}
.stag.show{opacity:1}
.stag.blue{color:#185FA5}
.fnote{background:#e8f2fb;border-radius:8px;padding:.6rem 1rem;font-size:12px;color:#0C447C;margin-bottom:.8rem;border-left:3px solid #185FA5;line-height:1.5}
.ins{background:#e8f5ef;border-radius:8px;padding:.65rem 1rem;margin-bottom:.6rem}
.ibadge{display:inline-block;background:white;color:#085041;font-size:11px;padding:3px 9px;border-radius:10px;margin:.15rem;border:1px solid #9FE1CB}
.slabel{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem;margin-top:.5rem}
.ansgrid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.4rem}
.ansitem{background:#f7f7f4;border-radius:8px;padding:.55rem .85rem;font-size:13px;border:1px solid #e8e8e4}
.ansgrp{font-size:11px;color:#999;margin-bottom:.15rem;font-weight:600}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl td{padding:.4rem .65rem;border-bottom:1px solid #f0f0ec;vertical-align:top}
.stbl td:first-child{color:#888;width:110px;font-weight:500}
.expbtn{padding:6px 14px;border:1px solid #0F6E56;border-radius:7px;background:white;color:#0F6E56;font-size:13px;cursor:pointer;font-weight:500}
.expbtn:hover{background:#e8f5ef}
.nextbtn{padding:6px 14px;border:1px solid #ddd;border-radius:7px;background:white;color:#333;font-size:13px;cursor:pointer}
.nextbtn:hover{background:#f5f5f2}
/* modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:white;border-radius:16px;padding:2rem;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center}
.modal h2{font-size:17px;font-weight:600;margin-bottom:.4rem}
.modal p{font-size:13px;color:#666;margin-bottom:1rem;line-height:1.5}
.modal input[type=password]{width:100%;border:1px solid #ddd;border-radius:8px;padding:.65rem;font-size:14px;text-align:center;margin-bottom:.5rem}
.modal input[type=password]:focus{outline:none;border-color:#0F6E56}
.merr{font-size:12px;color:#c0392b;min-height:16px;margin-bottom:.3rem}
.lbtn{width:100%;padding:9px;background:#0F6E56;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:.5rem}
.lbtn:hover{background:#085041}
.cancel-link{font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline}
/* QR modal */
.qr-modal-inner{text-align:center}
.qr-modal-inner .big-code{font-size:48px;font-weight:800;letter-spacing:.2em;color:#0F6E56;margin:.5rem 0 1rem}
/* join page */
.join-wrap{max-width:440px;margin:0 auto;padding-top:.5rem}
.join-card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:2rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.join-card h2{font-size:18px;font-weight:600;margin-bottom:.4rem}
.join-card .sub{font-size:13px;color:#666;margin-bottom:1.5rem}
.code-row{display:flex;gap:10px;justify-content:center;margin:1rem 0 .25rem}
.code-row input{width:60px;height:64px;border:2px solid #ddd;border-radius:10px;font-size:30px;text-align:center;font-weight:700;color:#0F6E56;outline:none;transition:border-color .15s}
.code-row input:focus{border-color:#0F6E56;background:#f7fdf9}
.grp-select{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:.75rem 0}
.grp-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #ddd;background:white;font-size:13px;cursor:pointer;color:#555;transition:all .15s}
.grp-btn.sel{background:#0F6E56;color:white;border-color:#0F6E56;font-weight:500}
/* fac live answers */
.q-ans-block{border:1px solid #e8e8e4;border-radius:10px;margin-bottom:.7rem;overflow:hidden}
.q-ans-hdr{background:#f7f7f4;padding:.55rem 1rem;font-size:12px;font-weight:600;color:#0F6E56;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;gap:5px}
.q-ans-hdr.blue{color:#185FA5;background:#f0f6ff}
.q-ans-txt{padding:.55rem 1rem;font-size:12px;color:#555;line-height:1.5;background:#fafafa;border-bottom:1px solid #f0f0ec}
.q-ans-body{padding:.3rem .5rem}
.g-row{display:flex;gap:.5rem;align-items:flex-start;padding:.3rem .4rem;border-bottom:.5px solid #f5f5f5}
.g-row:last-child{border-bottom:none}
.g-row .gn{font-size:11px;font-weight:600;color:#aaa;min-width:68px;padding-top:2px}
.g-row .gv{font-size:13px;color:#1a1a1a;flex:1;line-height:1.5}
.g-row .gv.empty{color:#ddd;font-style:italic}
.live-dot{display:inline-block;width:7px;height:7px;background:#2ecc71;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* time editor */
.time-editor{display:flex;flex-direction:column;gap:.5rem;text-align:left}
.time-row-e{display:flex;align-items:center;gap:.5rem}
.time-row-e label{font-size:13px;flex:1}
.time-row-e input{width:60px;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:13px;text-align:center}
@media(max-width:600px){.ansgrid{grid-template-columns:1fr}.content{padding:1rem}.header{padding:.85rem 1rem}.tdisp{font-size:20px}.code-row input{width:50px;height:54px;font-size:24px}}
</style>
</head>
<body>

<!-- Facilitator login -->
<div class="overlay" id="loginOverlay" style="display:none">
  <div class="modal">
    <h2>Facilitatorvy</h2>
    <p>Ange lösenord</p>
    <input type="password" id="pwInput" placeholder="Lösenord" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="merr" id="pwErr"></div>
    <button class="lbtn" onclick="checkPw()">Logga in</button>
    <div class="cancel-link" onclick="closeModal('loginOverlay')">Avbryt</div>
  </div>
</div>

<!-- QR / Code display modal -->
<div class="overlay" id="qrOverlay" style="display:none">
  <div class="modal">
    <div class="qr-modal-inner">
      <h2>Visa för deltagarna</h2>
      <p>Scanna QR-koden eller ange koden manuellt</p>
      <div id="qrModalCode"></div>
      <div class="big-code" id="qrModalDigits">1234</div>
      <div style="font-size:11px;color:#aaa;word-break:break-all;margin-bottom:1rem" id="qrModalUrl"></div>
      <button class="lbtn" onclick="closeModal('qrOverlay')">Stäng</button>
    </div>
  </div>
</div>

<!-- Time editor -->
<div class="overlay" id="timeOverlay" style="display:none">
  <div class="modal">
    <h2>⏱ Justera tider</h2>
    <p>Minuter per del</p>
    <div class="time-editor" id="timeEditor"></div>
    <div style="margin-top:.6rem;font-size:13px;text-align:left">Totalt: <strong id="totalMins">0</strong> min</div>
    <button class="lbtn" style="margin-top:.75rem" onclick="applyTimes()">Spara &amp; stäng</button>
    <div class="cancel-link" onclick="closeModal('timeOverlay')">Avbryt</div>
  </div>
</div>

<div class="header">
  <div>
    <h1>Konsultrollen i praktiken</h1>
    <div class="sub">Enhetsträff · arbetspass</div>
  </div>
  <div class="mode-btns">
    <button class="mbtn" id="btnFac" onclick="tryFac()">🔒 Facilitator</button>
    <button class="mbtn active" id="btnGrp" onclick="setMode('grp')">Gruppvy</button>
    <button class="mbtn" id="btnSum" onclick="trySum()">Summering</button>
    <button class="qrbtn show" id="btnQR" onclick="openQR()" title="Visa QR-kod">📲 Visa kod</button>
  </div>
</div>

<div class="tbar" id="tbar">
  <div id="tdisp" class="tdisp">—:——</div>
  <div class="phase-time-row" id="phaseTimeRow"></div>
  <div class="tctrl" id="tctrl">
    <button class="tbtn primary" onclick="startT()">▶</button>
    <button class="tbtn" onclick="pauseT()">⏸</button>
    <button class="tbtn" onclick="resetT()">↺</button>
    <button class="tbtn" onclick="openTimeEditor()">⚙️</button>
  </div>
</div>
<div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
<div class="content" id="mc"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,collection,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyAo_k0g2ee6utvUYxi8p5xp_HWidXTei8A",authDomain:"consultingskills-938d9.firebaseapp.com",projectId:"consultingskills-938d9",storageBucket:"consultingskills-938d9.firebasestorage.app",messagingSenderId:"250530809846",appId:"1:250530809846:web:eacdb035347952c595e9d7"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const SESSION="enhetsträff-v3";
window.fbSave=async(key,text)=>{try{await setDoc(doc(db,SESSION,key),{text,ts:Date.now()},{merge:true});}catch(e){console.error(e);}};
window.fbListen=(cb)=>{onSnapshot(collection(db,SESSION),(snap)=>{const d={};snap.forEach(s=>{d[s.id]=s.data().text||'';});cb(d);});};
window.fbReady=true;window.dispatchEvent(new Event('fbReady'));
</script>

<script>
const PASS='cyberbob';
const JOIN_CODE='1234';
const GROUPS=['Grupp 1','Grupp 2','Grupp 3','Grupp 4','Grupp 5'];
let PHASE_MINS=[10,20,20,20,15,5];
const PHASE_LABELS=['Intro','Del 1','Del 2','Del 3','Del 4','Avslut'];

let secs,running=false,iv=null,mode='grp',phase=0,isAuth=false,done={},ans={};
let selectedGroup=localStorage.getItem('sg')||'';
let groupUnlocked=localStorage.getItem('gu')==='1';

// Check URL for ?join=1 (from QR code scan)
const urlParams=new URLSearchParams(window.location.search);
const directJoin=urlParams.get('join')==='1';
if(directJoin&&!groupUnlocked){
  // Will show group picker directly, skipping code entry
}

function totalSecs(){return PHASE_MINS.reduce((a,b)=>a+b,0)*60;}
secs=totalSecs();

window.addEventListener('fbReady',()=>window.fbListen(d=>{ans=d;render();}));

function closeModal(id){document.getElementById(id).style.display='none';}

function tryFac(){document.getElementById('loginOverlay').style.display='flex';setTimeout(()=>document.getElementById('pwInput').focus(),100);}
function trySum(){if(isAuth)setMode('sum');else tryFac();}
function checkPw(){
  if(document.getElementById('pwInput').value===PASS){
    isAuth=true;closeModal('loginOverlay');document.getElementById('pwInput').value='';setMode('fac');
  } else {
    document.getElementById('pwErr').textContent='Fel lösenord';
    document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();
  }
}

function openQR(){
  const url=window.location.origin+window.location.pathname+'?join=1';
  document.getElementById('qrModalDigits').textContent=JOIN_CODE;
  document.getElementById('qrModalUrl').textContent=url;
  const el=document.getElementById('qrModalCode');
  el.innerHTML='';
  try{new QRCode(el,{text:url,width:160,height:160,colorDark:'#0F6E56',colorLight:'#ffffff'});}
  catch(e){el.textContent=url;}
  document.getElementById('qrOverlay').style.display='flex';
}

function openTimeEditor(){
  document.getElementById('timeEditor').innerHTML=PHASE_LABELS.map((l,i)=>
    `<div class="time-row-e"><label>${l}</label><input type="number" id="te${i}" min="1" max="90" value="${PHASE_MINS[i]}"> min</div>`
  ).join('');
  updateTotalMins();
  PHASE_LABELS.forEach((_,i)=>document.getElementById('te'+i).addEventListener('input',updateTotalMins));
  document.getElementById('timeOverlay').style.display='flex';
}
function updateTotalMins(){let t=0;PHASE_LABELS.forEach((_,i)=>{t+=parseInt(document.getElementById('te'+i).value)||0;});document.getElementById('totalMins').textContent=t;}
function applyTimes(){
  PHASE_LABELS.forEach((_,i)=>{PHASE_MINS[i]=parseInt(document.getElementById('te'+i).value)||PHASE_MINS[i];});
  secs=totalSecs();running=false;clearInterval(iv);upd();renderChips();closeModal('timeOverlay');
}

function startT(){if(running)return;running=true;iv=setInterval(()=>{if(secs>0){secs--;upd();}else{clearInterval(iv);running=false;}},1000);}
function pauseT(){clearInterval(iv);running=false;}
function resetT(){clearInterval(iv);running=false;secs=totalSecs();upd();}
function upd(){
  const tot=totalSecs(),m=Math.floor(secs/60),s=secs%60;
  const el=document.getElementById('tdisp');
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  el.className='tdisp'+(secs<300?' crit':secs<600?' warn':'');
  document.getElementById('pfill').style.width=`${((tot-secs)/tot*100).toFixed(1)}%`;
  renderChips();
}
function renderChips(){
  const tot=totalSecs(),elapsed=tot-secs;let cum=0;
  const row=document.getElementById('phaseTimeRow');if(!row)return;
  row.innerHTML=PHASE_LABELS.map((l,i)=>{
    const start=cum*60;cum+=PHASE_MINS[i];const end=cum*60;
    const isActive=elapsed>=start&&elapsed<end;
    const rem=Math.max(0,end-elapsed),rm=Math.floor(rem/60),rs=rem%60;
    return `<div class="ptime-chip${isActive?' active-phase':''}"><span>${isActive?rm+':'+rs.toString().padStart(2,'0'):PHASE_MINS[i]+'m'}</span><span>${l}</span></div>`;
  }).join('');
}

function setMode(m){
  mode=m;
  ['fac','grp','sum'].forEach((v,i)=>document.getElementById(['btnFac','btnGrp','btnSum'][i]).classList.toggle('active',v===m));
  document.getElementById('btnFac').textContent=isAuth?'✓ Facilitator':'🔒 Facilitator';
  // Hide timer controls in group view
  const tctrl=document.getElementById('tctrl');
  if(tctrl)tctrl.style.display=m==='grp'?'none':'flex';
  render();
}
function go(i){phase=Math.max(0,Math.min(i,PHASE_LABELS.length-1));renderChips();render();}
function ga(k){return ans[k]||'';}
function qKey(del,qi,grp){return `d${del}_q${qi}_${grp}`;}
function levKey(del,grp){return `d${del}_lev_${grp}`;}

async function sendAnswer(key,inputId,btnId,tagId){
  const val=document.getElementById(inputId)?.value||'';
  if(!val.trim())return;
  const btn=document.getElementById(btnId);
  if(btn){btn.disabled=true;btn.textContent='Sparar…';}
  await window.fbSave(key,val);
  if(btn){btn.disabled=false;btn.textContent='Skickat ✓';}
  const tag=document.getElementById(tagId);
  if(tag){tag.classList.add('show');setTimeout(()=>{tag.classList.remove('show');},2500);}
}

function render(){
  const c=document.getElementById('mc');
  if(mode==='fac') c.innerHTML=renderFac();
  else if(mode==='grp') c.innerHTML=renderGrp();
  else c.innerHTML=renderSum();
  renderChips();
}

function phaseNav(){
  return `<div class="pnav">${PHASE_LABELS.map((l,i)=>
    `<div class="ppill${i===phase?' active':done[i]?' done':''}" onclick="go(${i})">${l} <span style="opacity:.5;font-size:11px">${PHASE_MINS[i]}m</span></div>`
  ).join('')}</div>`;
}

// ===== GROUP VIEW =====
function renderGrp(){
  // If came via QR or already unlocked, show group picker or content
  if(directJoin&&!groupUnlocked) return renderGroupPicker();
  if(!groupUnlocked) return renderCodeEntry();
  if(phase===0) return renderGroupPicker(); // allow reselect on intro
  if(phase>=1&&phase<=4) return renderDelGrp(phase);
  return `<div class="card"><div class="empty">Passet är slut – tack för idag! 🎉</div></div>`;
}

function renderCodeEntry(){
  return `<div class="join-wrap"><div class="join-card">
    <h2>Välkommen!</h2>
    <div class="sub">Ange den 4-siffriga koden för att komma in</div>
    <div class="code-row">
      <input type="tel" maxlength="1" id="c0" oninput="ci(0)" onkeydown="cb(event,0)">
      <input type="tel" maxlength="1" id="c1" oninput="ci(1)" onkeydown="cb(event,1)">
      <input type="tel" maxlength="1" id="c2" oninput="ci(2)" onkeydown="cb(event,2)">
      <input type="tel" maxlength="1" id="c3" oninput="ci(3)" onkeydown="cb(event,3)">
    </div>
    <div class="merr" id="cErr"></div>
  </div></div>`;
}
function ci(i){
  const el=document.getElementById('c'+i);
  el.value=el.value.replace(/\D/,'').slice(-1);
  if(el.value&&i<3)document.getElementById('c'+(i+1)).focus();
  const code=['c0','c1','c2','c3'].map(id=>document.getElementById(id)?.value||'').join('');
  if(code.length===4){
    if(code===JOIN_CODE){groupUnlocked=true;localStorage.setItem('gu','1');render();}
    else{document.getElementById('cErr').textContent='Fel kod';['c0','c1','c2','c3'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('c0')?.focus();}
  }
}
function cb(e,i){if(e.key==='Backspace'&&!document.getElementById('c'+i)?.value&&i>0)document.getElementById('c'+(i-1)).focus();}

function renderGroupPicker(){
  return `<div class="join-wrap"><div class="join-card">
    <h2>Välj din grupp</h2>
    <div class="sub">${selectedGroup?`Du är nu i <strong>${selectedGroup}</strong> – byt om du vill`:'Välj vilken grupp du tillhör'}</div>
    <div class="grp-select">${GROUPS.map(g=>`<button class="grp-btn${selectedGroup===g?' sel':''}" onclick="pickGrp('${g}')">${g}</button>`).join('')}</div>
    <button class="lbtn" onclick="confirmGrp()">Gå in →</button>
    ${selectedGroup?`<div class="cancel-link" style="margin-top:.75rem" onclick="groupUnlocked=true;render()">Fortsätt som ${selectedGroup}</div>`:''}
  </div></div>`;
}
function pickGrp(g){
  selectedGroup=g;localStorage.setItem('sg',g);
  document.querySelectorAll('.grp-btn').forEach(b=>b.classList.toggle('sel',b.textContent.trim()===g));
}
function confirmGrp(){
  if(!selectedGroup){return;}
  groupUnlocked=true;localStorage.setItem('gu','1');
  // If phase is 0 (intro), move to phase 1 so they see content
  if(phase===0)phase=1;
  render();
}

function renderDelGrp(n){
  const d=DEFS[n];
  const qBlocks=d.questions.map((q,qi)=>{
    const key=qKey(n,qi,selectedGroup);
    const iid=`gi${n}${qi}`,bid=`gb${n}${qi}`,tid=`gt${n}${qi}`;
    return `<div class="qblock">
      <h4>${q.h}</h4><p>${q.p}</p>
      <textarea id="${iid}" placeholder="Anteckna gruppens tankar…">${ga(key)}</textarea>
      <div class="send-row">
        <button class="sbtn" id="${bid}" onclick="sendAnswer('${key}','${iid}','${bid}','${tid}')">Skicka svar</button>
        <span class="stag" id="${tid}">✓ Sparat!</span>
      </div>
    </div>`;
  }).join('');
  const lk=levKey(n,selectedGroup);
  const liid=`lev${n}`,lbid=`levb${n}`,ltid=`levt${n}`;

    <div class="ctitle">${d.title} <span style="font-size:12px;font-weight:400;color:#0F6E56">${selectedGroup}</span></div>
    <div class="csub">${d.time}</div>
    ${qBlocks}
    <div class="delivblock">
      <h4>📌 Leverans – detta redovisar ni för hela gruppen</h4>
      <p>${d.deliverable}</p>
      <textarea id="${liid}" placeholder="Skriv er leverans här…">${ga(lk)}</textarea>
      <div class="send-row">
        <button class="dbtn" id="${lbid}" onclick="sendAnswer('${lk}','${liid}','${lbid}','${ltid}')">Skicka leverans</button>
        <span class="stag blue" id="${ltid}">✓ Skickat!</span>
      </div>
    </div>

// ===== FACILITATOR VIEW =====
function renderFac(){
  if(phase===0)return phaseNav()+renderIntroFac();
  if(phase>=1&&phase<=4)return phaseNav()+renderDelFac(phase);
  return phaseNav()+renderAvsl();
}

function renderDelFac(n){
  const d=DEFS[n];
  const qBlocks=d.questions.map((q,qi)=>{
    const rows=GROUPS.map(g=>{const v=ga(qKey(n,qi,g));return `<div class="g-row"><div class="gn">${g}</div><div class="gv${v?'':' empty'}">${v||'inväntar…'}</div></div>`;}).join('');
    const has=GROUPS.some(g=>ga(qKey(n,qi,g)));
    return `<div class="q-ans-block">
      <div class="q-ans-hdr"><span class="live-dot"></span>&nbsp;${q.h}${has?' <span style="color:#085041;font-weight:400;font-size:11px">– svar inkomna</span>':''}</div>
      <div class="q-ans-txt">${q.p}</div>
      <div class="q-ans-body">${rows}</div>
    </div>`;
  }).join('');
  const levRows=GROUPS.map(g=>{const v=ga(levKey(n,g));return `<div class="g-row"><div class="gn">${g}</div><div class="gv${v?'':' empty'}">${v||'inväntar…'}</div></div>`;}).join('');
  const levHas=GROUPS.some(g=>ga(levKey(n,g)));
  return `<div class="card">
    <div class="ctitle">${d.title}</div>
    <div class="csub">${d.time}</div>
    ${d.extraNote?`<div class="fnote">${d.extraNote}</div>`:''}
    ${qBlocks}
    <div class="q-ans-block" style="border-color:#185FA5;margin-top:.5rem">
      <div class="q-ans-hdr blue"><span class="live-dot"></span>&nbsp;📌 Leverans${levHas?' <span style="color:#0e4070;font-weight:400;font-size:11px">– svar inkomna</span>':''}</div>
      <div class="q-ans-txt" style="color:#185FA5;font-weight:500">${d.deliverable}</div>
      <div class="q-ans-body">${levRows}</div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:.5rem;align-items:center">
      <button class="sbtn" onclick="done[${n}]=true;go(${n+1})">Gå vidare →</button>
    </div>
  </div>
  <div class="card">
    <div class="ctitle">Seniora insikter – lyft vid behov</div>
    <div class="ins">${d.insights.map(i=>`<span class="ibadge">${i}</span>`).join('')}</div>
  </div>`;
}

function renderIntroFac(){
  const tot=PHASE_MINS.reduce((a,b)=>a+b,0);
  return `
  <div class="fnote">Facilitatorvy · Intro (${PHASE_MINS[0]} min)<br>
  Deltagarnas kod: <strong style="font-size:20px;letter-spacing:.15em">${JOIN_CODE}</strong> &nbsp;–&nbsp; eller klicka <strong>📲 Visa kod</strong> för att visa QR på projektor</div>
  <div class="card">

function renderAvsl(){
  return `
  <div class="fnote">Avslut (${PHASE_MINS[5]} min) – Summera med kärnbudskapet nedan.</div>
  <div class="card">
    <div class="ctitle">Kärnbudskap</div>
    <div class="qblock"><p>Konsultrollen är alltid <em>fler hattar än jobbtiteln</em>. Det är inte en nackdel – det är det som skapar verkligt värde.</p></div>
    <div class="qblock"><p>Att rapportera rätt är ärlighet mot sig själv och Combitech. Obelagd tid är investeringstid.</p></div>
    <div class="qblock"><p>De bästa konsulterna vet när de ska vara psykolog, expert, säljare – och när de ska ringa chefen.</p></div>
  </div>
  <div class="card">
    <div class="ctitle">Uppföljning</div>
    <textarea placeholder="Vad ska följas upp? Vad fastnade? Vem gör vad?" style="min-height:80px"></textarea>
    <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="nextbtn" onclick="setMode('sum')">Visa summering →</button>
      <button class="expbtn" onclick="exportAnswers()">⬇ Exportera (.txt)</button>
    </div>
  </div>`;
}

// ===== SUMMARY =====
function renderSum(){
  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:.75rem"><button class="expbtn" onclick="exportAnswers()">⬇ Exportera (.txt)</button></div>`;
  let hasAny=false;
  for(let n=1;n<=4;n++){
    const d=DEFS[n];
    const delHas=d.questions.some((q,qi)=>GROUPS.some(g=>ga(qKey(n,qi,g))))||GROUPS.some(g=>ga(levKey(n,g)));
    if(!delHas)continue;
    hasAny=true;
    html+=`<div class="card"><div class="ctitle"><span class="live-dot"></span>&nbsp;${d.title}</div>`;
    d.questions.forEach((q,qi)=>{
      const f=GROUPS.filter(g=>ga(qKey(n,qi,g)));
      if(!f.length)return;
      html+=`<div style="margin-bottom:.85rem"><div class="slabel">${q.h}</div><div class="ansgrid">`;
      f.forEach(g=>{html+=`<div class="ansitem"><div class="ansgrp">${g}</div>${ga(qKey(n,qi,g))}</div>`;});
      html+=`</div></div>`;
    });
    const lf=GROUPS.filter(g=>ga(levKey(n,g)));
    if(lf.length){
      html+=`<div style="border-top:1px solid #eee;padding-top:.75rem;margin-bottom:.5rem"><div class="slabel" style="color:#185FA5">📌 Leverans</div><div class="ansgrid">`;
      lf.forEach(g=>{html+=`<div class="ansitem" style="border-color:#b8d4f0"><div class="ansgrp">${g}</div>${ga(levKey(n,g))}</div>`;});
      html+=`</div></div>`;
    }
    html+=`</div>`;
  }
  if(!hasAny)html+=`<div class="card"><div class="empty">Inga svar inkomna ännu.</div></div>`;
  return html;
}

function exportAnswers(){
  let txt='WORKSHOP – Konsultrollen i praktiken\nEnhetsträff · '+new Date().toLocaleDateString('sv-SE')+'\n'+'='.repeat(40)+'\n\n';
  for(let n=1;n<=4;n++){
    const d=DEFS[n];txt+=d.title+'\n'+'-'.repeat(35)+'\n';
    d.questions.forEach((q,qi)=>{const f=GROUPS.filter(g=>ga(qKey(n,qi,g)));if(!f.length)return;txt+='\n  '+q.h+':\n';f.forEach(g=>{txt+='    '+g+': '+ga(qKey(n,qi,g))+'\n';});});
    const lf=GROUPS.filter(g=>ga(levKey(n,g)));if(lf.length){txt+='\n  LEVERANS:\n';lf.forEach(g=>{txt+='    '+g+': '+ga(levKey(n,g))+'\n';});}
    txt+='\n';
  }
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='workshop-'+new Date().toISOString().slice(0,10)+'.txt';a.click();
}

upd();render();
