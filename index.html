<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konsultrollen i praktiken – Enhetsträff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#0F6E56,#185FA5);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header h1{font-size:20px;font-weight:500;color:white;margin:0}
.header .sub{font-size:12px;opacity:.75;margin-top:3px;color:white}
.mode-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mbtn{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.45);background:transparent;color:white;font-size:12px;cursor:pointer;transition:all .15s}
.mbtn.active{background:white;color:#0F6E56;font-weight:500}
.tbar{background:rgba(15,110,86,0.92);padding:.75rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.tdisp{font-size:28px;font-weight:700;color:white;min-width:72px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.tdisp.warn{color:#FFD166}
.tdisp.crit{color:#FF6B6B;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.phase-time-row{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.ptime-chip{background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;min-width:60px}
.ptime-chip.active-phase{background:rgba(255,255,255,.35);font-weight:600}
.ptime-chip span{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.tctrl{display:flex;gap:5px;align-items:center}
.tbtn{padding:5px 13px;border-radius:6px;border:1px solid rgba(255,255,255,0.35);background:transparent;color:white;font-size:12px;cursor:pointer}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tbtn.primary{background:rgba(255,255,255,.25)}
.pbar{height:5px;background:#0a4a38}
.pfill{height:100%;background:#5DCAA5;transition:width .5s}
.content{padding:1.5rem 2rem;max-width:920px;margin:0 auto}
.pnav{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.ppill{padding:5px 14px;border-radius:20px;border:1px solid #ddd;background:white;font-size:12px;cursor:pointer;white-space:nowrap;color:#666;transition:all .15s}
.ppill.active{background:#0F6E56;color:white;border-color:#0F6E56}
.ppill.done::after{content:" ✓"}
.card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ctitle{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:.2rem;display:flex;align-items:center;gap:7px}
.csub{font-size:12px;color:#888;margin-bottom:.9rem}
.qbox{background:#f7f7f4;border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.6rem;border-left:3px solid #0F6E56}
.qbox h4{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:.3rem}
.qbox p{font-size:13px;color:#333;line-height:1.6}
.qbox.blue{border-left-color:#185FA5}
.qbox.blue h4{color:#185FA5}
.fnote{background:#e8f2fb;border-radius:8px;padding:.65rem 1rem;font-size:12px;color:#0C447C;margin-bottom:.85rem;border-left:3px solid #185FA5;line-height:1.5}
.fnote strong{color:#0C447C}
.ins{background:#e8f5ef;border-radius:8px;padding:.7rem 1rem;margin-bottom:.6rem}
.ibadge{display:inline-block;background:white;color:#085041;font-size:11px;padding:3px 9px;border-radius:10px;margin:.15rem;border:1px solid #9FE1CB}
textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:.65rem;font-size:13px;min-height:72px;resize:vertical;background:white;color:#1a1a1a;font-family:inherit;margin-top:.4rem}
textarea:focus{outline:none;border-color:#0F6E56;box-shadow:0 0 0 2px rgba(15,110,86,.1)}
.sbtn{padding:7px 18px;background:#0F6E56;color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500}
.sbtn:hover{background:#085041}
.sbtn:disabled{background:#aaa;cursor:default}
.stag{font-size:12px;color:#0F6E56;margin-left:8px;opacity:0;transition:opacity .3s}
.stag.show{opacity:1}
.slabel{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem;margin-top:.6rem}
.ansgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.5rem}
.ansitem{background:#f7f7f4;border-radius:8px;padding:.65rem .9rem;font-size:13px;border:1px solid #e8e8e4}
.ansgrp{font-size:11px;color:#999;margin-bottom:.2rem;font-weight:600}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl td{padding:.45rem .7rem;border-bottom:1px solid #f0f0ec;vertical-align:top}
.stbl td:first-child{color:#888;width:120px;font-weight:500}
.expbtn{padding:7px 16px;border:1px solid #0F6E56;border-radius:7px;background:white;color:#0F6E56;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.expbtn:hover{background:#e8f5ef}
.nextbtn{padding:7px 16px;border:1px solid #ddd;border-radius:7px;background:white;color:#333;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.nextbtn:hover{background:#f5f5f2}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:white;border-radius:16px;padding:2rem;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18);text-align:center}
.modal h2{font-size:17px;font-weight:600;margin-bottom:.4rem}
.modal p{font-size:13px;color:#888;margin-bottom:1rem;line-height:1.5}
.modal input[type=password]{width:100%;border:1px solid #ddd;border-radius:8px;padding:.65rem;font-size:14px;text-align:center;margin-bottom:.6rem}
.modal input[type=password]:focus{outline:none;border-color:#0F6E56}
.merr{font-size:12px;color:#c0392b;min-height:16px;margin-bottom:.4rem}
.lbtn{width:100%;padding:9px;background:#0F6E56;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:.5rem}
.lbtn:hover{background:#085041}
.cancel-link{font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline}
.code-inputs{display:flex;gap:8px;justify-content:center;margin:1rem 0}
.code-inputs input{width:54px;height:58px;border:2px solid #ddd;border-radius:10px;font-size:26px;text-align:center;font-weight:700;color:#0F6E56;outline:none}
.code-inputs input:focus{border-color:#0F6E56}
.grp-select{display:flex;gap:8px;flex-wrap:wrap;margin:.75rem 0;justify-content:center}
.grp-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #ddd;background:white;font-size:13px;cursor:pointer;color:#555;transition:all .15s}
.grp-btn.sel{background:#0F6E56;color:white;border-color:#0F6E56;font-weight:500}
.live-badge{display:inline-block;width:8px;height:8px;background:#2ecc71;border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-note{font-size:11px;color:#aaa;margin-left:4px}
.time-editor{display:flex;flex-direction:column;gap:.5rem;text-align:left}
.time-row{display:flex;align-items:center;gap:.5rem}
.time-row label{font-size:13px;color:#333;flex:1}
.time-row input[type=number]{width:60px;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:13px;text-align:center}
/* Fråga-svar-block i facilitator */
.q-answer-block{border:1px solid #e8e8e4;border-radius:10px;margin-bottom:.75rem;overflow:hidden}
.q-answer-header{background:#f7f7f4;padding:.6rem 1rem;font-size:12px;font-weight:600;color:#0F6E56;border-bottom:1px solid #e8e8e4}
.q-answer-body{padding:.6rem 1rem}
.group-answer-row{display:flex;gap:.5rem;align-items:flex-start;padding:.35rem 0;border-bottom:.5px solid #f0f0ec}
.group-answer-row:last-child{border-bottom:none}
.group-answer-row .gname{font-size:11px;font-weight:600;color:#888;min-width:72px;padding-top:2px}
.group-answer-row .gval{font-size:13px;color:#1a1a1a;flex:1;line-height:1.5}
.group-answer-row .gval.empty{color:#ccc;font-style:italic}
/* join view */
.join-card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:2rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.join-card h2{font-size:18px;font-weight:600;margin-bottom:.5rem}
.join-card p{font-size:13px;color:#666;margin-bottom:1.5rem}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:#bbb;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}
.manual-code{display:flex;gap:8px;justify-content:center;margin-bottom:.75rem}
.manual-code input{width:54px;height:58px;border:2px solid #ddd;border-radius:10px;font-size:26px;text-align:center;font-weight:700;color:#0F6E56;outline:none}
.manual-code input:focus{border-color:#0F6E56}
.qr-wrap p{font-size:13px;color:#555;margin-bottom:.75rem}
#qrcode{display:inline-block;padding:12px;background:white;border:1px solid #ddd;border-radius:10px}
.qr-url{font-size:11px;color:#aaa;margin-top:.5rem;word-break:break-all}
@media(max-width:600px){.ansgrid{grid-template-columns:1fr}.content{padding:1rem}.header{padding:1rem}.tdisp{font-size:22px}}
</style>
</head>
<body>

<!-- Facilitator login -->
<div class="overlay" id="loginOverlay" style="display:none">
  <div class="modal">
    <h2>Facilitatorvy</h2>
    <p>Ange lösenord</p>
    <input type="password" id="pwInput" placeholder="Lösenord" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="merr" id="pwErr"></div>
    <button class="lbtn" onclick="checkPw()">Logga in</button>
    <div class="cancel-link" onclick="closeModal('loginOverlay')">Avbryt</div>
  </div>
</div>

<!-- Time editor -->
<div class="overlay" id="timeOverlay" style="display:none">
  <div class="modal">
    <h2>⏱ Justera tider</h2>
    <p>Antal minuter per del</p>
    <div class="time-editor" id="timeEditor"></div>
    <div style="margin-top:.75rem;font-size:13px;color:#555;text-align:left">Totalt: <strong id="totalMins">0</strong> min</div>
    <button class="lbtn" style="margin-top:1rem" onclick="applyTimes()">Spara &amp; stäng</button>
    <div class="cancel-link" onclick="closeModal('timeOverlay')">Avbryt</div>
  </div>
</div>

<div class="header">
  <div>
    <h1>Konsultrollen i praktiken</h1>
    <div class="sub">Enhetsträff · arbetspass</div>
  </div>
  <div class="mode-btns">
    <button class="mbtn" id="btnFac" onclick="tryFac()">🔒 Facilitator</button>
    <button class="mbtn active" id="btnGrp" onclick="setMode('grp')">Gruppvy</button>
    <button class="mbtn" id="btnSum" onclick="trySum()">Summering</button>
  </div>
</div>

<div class="tbar">
  <div id="tdisp" class="tdisp">—:——</div>
  <div class="phase-time-row" id="phaseTimeRow"></div>
  <div class="tctrl">
    <button class="tbtn primary" onclick="startT()">▶ Start</button>
    <button class="tbtn" onclick="pauseT()">⏸</button>
    <button class="tbtn" onclick="resetT()">↺</button>
    <button class="tbtn" onclick="openTimeEditor()" title="Justera tider">⚙️</button>
  </div>
</div>
<div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
<div class="content" id="mc"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,collection,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyAo_k0g2ee6utvUYxi8p5xp_HWidXTei8A",authDomain:"consultingskills-938d9.firebaseapp.com",projectId:"consultingskills-938d9",storageBucket:"consultingskills-938d9.firebasestorage.app",messagingSenderId:"250530809846",appId:"1:250530809846:web:eacdb035347952c595e9d7"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const SESSION="enhetsträff-2026";
window.fbSave=async(key,group,text)=>{try{await setDoc(doc(db,SESSION,key+'__'+group),{text,group,key,ts:Date.now()},{merge:true});}catch(e){console.error(e);}};
window.fbListen=(cb)=>{onSnapshot(collection(db,SESSION),(snap)=>{const d={};snap.forEach(s=>{d[s.id]=s.data().text||'';});cb(d);});};
window.fbReady=true;window.dispatchEvent(new Event('fbReady'));
</script>

<script>
const PASS='cyberbob';
const JOIN_CODE='1234';
const GROUPS=['Grupp 1','Grupp 2','Grupp 3','Grupp 4','Grupp 5'];
let PHASE_MINS=[10,20,20,20,15,5];
const PHASE_LABELS=['Intro','Del 1 – Skills','Del 2 – Varumärke','Del 3 – Obelagd tid','Del 4 – Hattar','Avslut'];

let totalSecs=()=>PHASE_MINS.reduce((a,b)=>a+b,0)*60;
let secs=totalSecs(),running=false,iv=null;
let mode='grp',phase=0,isAuth=false,done={};
let ans={};
let selectedGroup=localStorage.getItem('sg')||'';
let groupUnlocked=localStorage.getItem('gu')==='1';

window.addEventListener('fbReady',()=>window.fbListen(d=>{ans=d;render();}));

function closeModal(id){document.getElementById(id).style.display='none';}
function tryFac(){document.getElementById('loginOverlay').style.display='flex';setTimeout(()=>document.getElementById('pwInput').focus(),100);}
function trySum(){if(isAuth)setMode('sum');else tryFac();}
function checkPw(){
  if(document.getElementById('pwInput').value===PASS){isAuth=true;closeModal('loginOverlay');document.getElementById('pwInput').value='';setMode('fac');}
  else{document.getElementById('pwErr').textContent='Fel lösenord';document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();}
}

function openTimeEditor(){
  const ed=document.getElementById('timeEditor');
  ed.innerHTML=PHASE_LABELS.map((l,i)=>`<div class="time-row"><label>${l}</label><input type="number" id="te${i}" min="1" max="90" value="${PHASE_MINS[i]}"> min</div>`).join('');
  updateTotalMins();
  PHASE_LABELS.forEach((_,i)=>document.getElementById('te'+i).addEventListener('input',updateTotalMins));
  document.getElementById('timeOverlay').style.display='flex';
}
function updateTotalMins(){let t=0;PHASE_LABELS.forEach((_,i)=>{t+=parseInt(document.getElementById('te'+i).value)||0;});document.getElementById('totalMins').textContent=t;}
function applyTimes(){PHASE_LABELS.forEach((_,i)=>{PHASE_MINS[i]=parseInt(document.getElementById('te'+i).value)||PHASE_MINS[i];});secs=totalSecs();running=false;clearInterval(iv);upd();renderPhaseChips();closeModal('timeOverlay');}

function startT(){if(running)return;running=true;iv=setInterval(()=>{if(secs>0){secs--;upd();}else{clearInterval(iv);running=false;}},1000);}
function pauseT(){clearInterval(iv);running=false;}
function resetT(){clearInterval(iv);running=false;secs=totalSecs();upd();}
function upd(){
  const tot=totalSecs(),m=Math.floor(secs/60),s=secs%60;
  const el=document.getElementById('tdisp');
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  el.className='tdisp'+(secs<300?' crit':secs<600?' warn':'');
  document.getElementById('pfill').style.width=`${((tot-secs)/tot*100).toFixed(1)}%`;
  renderPhaseChips();
}
function renderPhaseChips(){
  const tot=totalSecs(),elapsed=tot-secs;
  let cum=0;
  const row=document.getElementById('phaseTimeRow');
  if(!row)return;
  row.innerHTML=PHASE_LABELS.map((l,i)=>{
    const start=cum*60;cum+=PHASE_MINS[i];const end=cum*60;
    const isActive=elapsed>=start&&elapsed<end;
    const remSecs=Math.max(0,end-elapsed);
    const rm=Math.floor(remSecs/60),rs=remSecs%60;
    return `<div class="ptime-chip ${isActive?'active-phase':''}"><span>${isActive?rm+':'+rs.toString().padStart(2,'0'):PHASE_MINS[i]+'m'}</span><span style="font-size:10px;opacity:.8">${l}</span></div>`;
  }).join('');
}

function setMode(m){
  mode=m;
  ['fac','grp','sum'].forEach((v,i)=>document.getElementById(['btnFac','btnGrp','btnSum'][i]).classList.toggle('active',v===m));
  document.getElementById('btnFac').textContent=isAuth?'✓ Facilitator':'🔒 Facilitator';
  render();
}
function go(i){phase=Math.max(0,Math.min(i,PHASE_LABELS.length-1));renderPhaseChips();render();}
function ga(k){return ans[k]||'';}

// Each question gets its own answer key: del_qindex__group
function fbKey(del,qIdx){return 'd'+del+'_q'+qIdx;}

async function groupSubmit(fbkey,group,inputId,btnId,tagId){
  const val=document.getElementById(inputId)?.value;
  if(!val||!val.trim())return;
  const btn=document.getElementById(btnId);
  if(btn){btn.disabled=true;btn.textContent='Sparar…';}
  await window.fbSave(fbkey,group,val);
  if(btn)btn.textContent='Skickat!';
  const tag=document.getElementById(tagId);
  if(tag){tag.classList.add('show');setTimeout(()=>tag.classList.remove('show'),2500);}
}

function render(){
  const c=document.getElementById('mc');
  if(mode==='fac')c.innerHTML=renderFac();
  else if(mode==='grp')c.innerHTML=renderGrp();
  else c.innerHTML=renderSum();
  if(mode==='grp'&&phase===0)generateQR();
  renderPhaseChips();
}

function phaseNav(){
  return `<div class="pnav">${PHASE_LABELS.map((l,i)=>`<div class="ppill ${i===phase?'active':done[i]?'done':''}" onclick="go(${i})">${l} <span style="opacity:.5;font-size:11px">${PHASE_MINS[i]}m</span></div>`).join('')}</div>`;
}

function renderFac(){
  if(phase===0)return phaseNav()+renderIntroFac();
  if(phase>=1&&phase<=4)return phaseNav()+renderDelFac(phase);
  return phaseNav()+renderAvsl();
}
function renderGrp(){
  if(phase===0)return renderJoinView();
  if(!groupUnlocked)return renderJoinView();
  if(phase>=1&&phase<=4)return renderDelGrp(phase);
  return `<div class="card"><div class="empty">Passet är slut – tack för idag! 🎉</div></div>`;
}

// ---- JOIN VIEW (gruppvy startsida) ----
function renderJoinView(){
  return `<div class="join-card">
    <h2>Välkommen!</h2>
    <p>Ange koden för att komma åt grupparbetet och välj din grupp.</p>
    <div class="manual-code" id="manualCodeInputs"></div>
    <div class="merr" id="joinErr"></div>
    <div id="joinGroupPicker" style="display:none">
      <p style="font-size:13px;color:#333;margin-bottom:.25rem">Välj din grupp:</p>
      <div class="grp-select" id="joinGrpBtns"></div>
    </div>
    <button class="sbtn" id="joinBtn" onclick="handleJoin()" style="width:100%;margin-top:.5rem">Fortsätt</button>
    <div class="divider">eller scanna QR-koden</div>
    <div class="qr-wrap">
      <div id="qrcode"></div>
      <div class="qr-url" id="qrurl"></div>
    </div>
  </div>`;
}

function buildManualInputs(){
  const wrap=document.getElementById('manualCodeInputs');
  if(!wrap)return;
  wrap.innerHTML='';
  for(let i=0;i<4;i++){
    const inp=document.createElement('input');
    inp.type='text';inp.maxLength=1;inp.inputMode='numeric';inp.id='jci'+i;
    inp.className='';
    inp.addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/,'');if(e.target.value&&i<3)document.getElementById('jci'+(i+1)).focus();checkAutoSubmit();});
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)document.getElementById('jci'+(i-1)).focus();});
    wrap.appendChild(inp);
  }
  setTimeout(()=>document.getElementById('jci0')?.focus(),150);
}
function checkAutoSubmit(){
  const code=['jci0','jci1','jci2','jci3'].map(id=>document.getElementById(id)?.value||'').join('');
  if(code.length===4)handleJoin();
}
function handleJoin(){
  const code=['jci0','jci1','jci2','jci3'].map(id=>document.getElementById(id)?.value||'').join('');
  const errEl=document.getElementById('joinErr');
  if(code!==JOIN_CODE){if(errEl)errEl.textContent='Fel kod – försök igen';['jci0','jci1','jci2','jci3'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('jci0')?.focus();return;}
  if(errEl)errEl.textContent='';
  const picker=document.getElementById('joinGroupPicker');
  if(picker)picker.style.display='block';
  const gb=document.getElementById('joinGrpBtns');
  if(gb)gb.innerHTML=GROUPS.map(g=>`<button class="grp-btn ${selectedGroup===g?'sel':''}" onclick="joinPickGroup('${g}')">${g}</button>`).join('');
  const btn=document.getElementById('joinBtn');
  if(btn){btn.textContent='Gå in i gruppen';btn.onclick=confirmJoin;}
}
function joinPickGroup(g){selectedGroup=g;document.querySelectorAll('#joinGrpBtns .grp-btn').forEach(b=>b.classList.toggle('sel',b.textContent.trim()===g));}
function confirmJoin(){
  if(!selectedGroup){const e=document.getElementById('joinErr');if(e)e.textContent='Välj en grupp';return;}
  groupUnlocked=true;localStorage.setItem('sg',selectedGroup);localStorage.setItem('gu','1');
  render();
}

function generateQR(){
  buildManualInputs();
  setTimeout(()=>{
    const el=document.getElementById('qrcode'),urlEl=document.getElementById('qrurl');
    if(!el)return;
    const url=window.location.href.split('?')[0];
    if(urlEl)urlEl.textContent=url;
    el.innerHTML='';
    try{new QRCode(el,{text:url,width:140,height:140,colorDark:'#0F6E56',colorLight:'#ffffff'});}
    catch(e){el.textContent=url;}
  },200);
}

// ---- SUMMARY ----
function renderSum(){
  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:.75rem"><button class="expbtn" onclick="exportAnswers()">⬇ Exportera (.txt)</button></div>`;
  let hasAny=false;
  for(let n=1;n<=4;n++){
    const d=DEFS[n];
    const delHasAny=d.questions.some((q,qi)=>GROUPS.some(g=>ga(fbKey(n,qi)+'__'+g)));
    if(!delHasAny)continue;
    hasAny=true;
    html+=`<div class="card"><div class="ctitle"><span class="live-badge"></span>${d.title}</div>`;
    d.questions.forEach((q,qi)=>{
      const fk=fbKey(n,qi);
      const filled=GROUPS.filter(g=>ga(fk+'__'+g));
      if(!filled.length)return;
      html+=`<div style="margin-bottom:1rem">
        <div class="slabel">${q.h}</div>
        <div class="ansgrid">${filled.map(g=>`<div class="ansitem"><div class="ansgrp">${g}</div>${ga(fk+'__'+g)}</div>`).join('')}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(!hasAny)html+=`<div class="card"><div class="empty">Inga svar inkomna ännu.</div></div>`;
  return html;
}

function exportAnswers(){
  let txt='WORKSHOP – Konsultrollen i praktiken\nEnhetsträff · '+new Date().toLocaleDateString('sv-SE')+'\n'+'='.repeat(40)+'\n\n';
  for(let n=1;n<=4;n++){
    const d=DEFS[n];
    txt+=d.title+'\n'+'-'.repeat(35)+'\n';
    d.questions.forEach((q,qi)=>{
      const fk=fbKey(n,qi);
      const filled=GROUPS.filter(g=>ga(fk+'__'+g));
      if(!filled.length)return;
      txt+='\n  '+q.h+':\n';
      filled.forEach(g=>{txt+='    '+g+': '+ga(fk+'__'+g)+'\n';});
    });
    txt+='\n';
  }
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='workshop-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
}
