<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konsultrollen i praktiken – Enhetsträff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#0F6E56,#185FA5);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header h1{font-size:20px;font-weight:500;color:white}
.header .sub{font-size:12px;opacity:.75;margin-top:3px;color:white}
.mode-btns{display:flex;gap:6px}
.mbtn{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.45);background:transparent;color:white;font-size:12px;cursor:pointer;transition:all .15s}
.mbtn.active{background:white;color:#0F6E56;font-weight:500}
.tbar{background:rgba(15,110,86,0.88);padding:.65rem 2rem;display:flex;align-items:center;gap:1rem}
.tdisp{font-size:20px;font-weight:500;color:white;min-width:60px;font-variant-numeric:tabular-nums}
.tlabel{font-size:12px;color:rgba(255,255,255,.7);flex:1}
.tctrl{display:flex;gap:5px}
.tbtn{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.35);background:transparent;color:white;font-size:12px;cursor:pointer}
.tbtn:hover{background:rgba(255,255,255,.2)}
.pbar{height:4px;background:rgba(255,255,255,.15);background-color:#0a4a38}
.pfill{height:100%;background:#5DCAA5;transition:width .5s}
.content{padding:1.5rem 2rem;max-width:900px;margin:0 auto}
.pnav{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.ppill{padding:5px 14px;border-radius:20px;border:1px solid #ddd;background:white;font-size:12px;cursor:pointer;white-space:nowrap;color:#666;transition:all .15s}
.ppill.active{background:#0F6E56;color:white;border-color:#0F6E56}
.ppill.done{background:#f0f0ec;color:#888}
.ppill.done::after{content:" ✓"}
.card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ctitle{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:.2rem;display:flex;align-items:center;gap:7px}
.csub{font-size:12px;color:#888;margin-bottom:.9rem}
.qbox{background:#f7f7f4;border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.6rem;border-left:3px solid #0F6E56}
.qbox h4{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:.3rem}
.qbox p{font-size:13px;color:#333;line-height:1.6}
.qbox.blue{border-left-color:#185FA5}
.qbox.blue h4{color:#185FA5}
.fnote{background:#e8f2fb;border-radius:8px;padding:.65rem 1rem;font-size:12px;color:#0C447C;margin-bottom:.85rem;border-left:3px solid #185FA5;line-height:1.5}
.ins{background:#e8f5ef;border-radius:8px;padding:.7rem 1rem;margin-bottom:.6rem}
.ins h4{font-size:12px;font-weight:600;color:#085041;margin-bottom:.4rem}
.ibadge{display:inline-block;background:white;color:#085041;font-size:11px;padding:3px 9px;border-radius:10px;margin:.15rem;border:1px solid #9FE1CB}
textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:.65rem;font-size:13px;min-height:72px;resize:vertical;background:white;color:#1a1a1a;font-family:inherit;margin-top:.4rem}
textarea:focus{outline:none;border-color:#0F6E56;box-shadow:0 0 0 2px rgba(15,110,86,.1)}
.sbtn{padding:7px 18px;background:#0F6E56;color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;margin-top:.5rem;font-weight:500}
.sbtn:hover{background:#085041}
.stag{font-size:12px;color:#0F6E56;margin-left:8px;opacity:0;transition:opacity .3s}
.stag.show{opacity:1}
.slabel{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem;margin-top:.7rem}
.ansgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.75rem}
.ansitem{background:#f7f7f4;border-radius:8px;padding:.65rem .9rem;font-size:13px;border:1px solid #e8e8e4}
.ansgrp{font-size:11px;color:#999;margin-bottom:.2rem;font-weight:600}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl td{padding:.45rem .7rem;border-bottom:1px solid #f0f0ec;vertical-align:top}
.stbl td:first-child{color:#888;width:110px;font-weight:500}
.nextbtn{padding:7px 16px;border:1px solid #ddd;border-radius:7px;background:white;color:#333;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:.75rem}
.nextbtn:hover{background:#f5f5f2}
@media(max-width:600px){.ansgrid{grid-template-columns:1fr}.header{padding:1rem}.content{padding:1rem}}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Konsultrollen i praktiken</h1>
    <div class="sub">Enhetsträff · arbetspass · 90 min</div>
  </div>
  <div class="mode-btns">
    <button class="mbtn active" onclick="setMode('fac')">Facilitator</button>
    <button class="mbtn" onclick="setMode('grp')">Gruppvy</button>
    <button class="mbtn" onclick="setMode('sum')">Summering</button>
  </div>
</div>

<div class="tbar">
  <div class="tdisp" id="tdisp">90:00</div>
  <div class="tlabel" id="tlabel">Klicka start när ni är redo</div>
  <div class="tctrl">
    <button class="tbtn" onclick="startT()">▶ Start</button>
    <button class="tbtn" onclick="pauseT()">⏸ Paus</button>
    <button class="tbtn" onclick="resetT()">↺ Reset</button>
  </div>
</div>
<div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>

<div class="content" id="mc"></div>

<script>
const PHASES=[
  {id:'intro',label:'Intro',mins:10},
  {id:'del1',label:'Del 1 – Skills',mins:25},
  {id:'del2',label:'Del 2 – Varumärke',mins:25},
  {id:'del3',label:'Del 3 – Hattar',mins:20},
  {id:'avsl',label:'Avslut',mins:10},
];
const GROUPS=['Grupp 1','Grupp 2','Grupp 3','Grupp 4','Grupp 5'];
const TOTAL=90*60;
let mode='fac',phase=0,secs=TOTAL,running=false,iv=null,ans={},done={};

function setMode(m){
  mode=m;
  document.querySelectorAll('.mbtn').forEach((b,i)=>b.classList.toggle('active',['fac','grp','sum'][i]===m));
  render();
}
function startT(){if(running)return;running=true;iv=setInterval(()=>{if(secs>0){secs--;upd();}else{clearInterval(iv);running=false;}},1000);}
function pauseT(){clearInterval(iv);running=false;}
function resetT(){clearInterval(iv);running=false;secs=TOTAL;upd();}
function upd(){
  const m=Math.floor(secs/60),s=secs%60;
  document.getElementById('tdisp').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('pfill').style.width=`${((TOTAL-secs)/TOTAL*100).toFixed(1)}%`;
}
function sv(k,v){ans[k]=v;const t=document.getElementById('st_'+k);if(t){t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}}
function ga(k){return ans[k]||'';}
function go(i){phase=Math.max(0,Math.min(i,PHASES.length-1));document.getElementById('tlabel').textContent=PHASES[phase].label;render();}

function phaseNav(){
  return `<div class="pnav">${PHASES.map((p,i)=>`<div class="ppill ${i===phase?'active':done[i]?'done':''}" onclick="go(${i})">${p.label} <span style="opacity:.5;font-size:11px">${p.mins}m</span></div>`).join('')}</div>`;
}
function groupInputs(eid){
  return GROUPS.map(g=>`
    <div>
      <div class="slabel">${g}</div>
      <textarea placeholder="Vad delade de?" onchange="sv('${eid}_${g}',this.value)">${ga(eid+'_'+g)}</textarea>
      <span class="stag" id="st_${eid}_${g}">Sparat ✓</span>
    </div>`).join('');
}

function render(){
  const c=document.getElementById('mc');
  if(mode==='fac') c.innerHTML=renderFac();
  else if(mode==='grp') c.innerHTML=renderGrp();
  else c.innerHTML=renderSum();
}

function renderFac(){
  if(phase===0) return phaseNav()+renderIntro();
  if(phase===1) return phaseNav()+renderD1(true);
  if(phase===2) return phaseNav()+renderD2(true);
  if(phase===3) return phaseNav()+renderD3(true);
  return phaseNav()+renderAvsl();
}
function renderGrp(){
  if(phase===1) return renderD1(false);
  if(phase===2) return renderD2(false);
  if(phase===3) return renderD3(false);
  return `<div class="card"><div class="empty">Ingen aktiv gruppuppgift just nu – vänta på facilitatorn.</div></div>`;
}

function renderIntro(){
  return `
  <div class="fnote">Facilitatorvy · Intro (10 min) – Välkomna alla, gör en snabb runda och sätt tonen: det här är ett öppet samtal mellan kollegor, inga rätta svar.</div>
  <div class="card">
    <div class="ctitle">Agenda – 90 min</div>
    <table class="stbl">
      <tr><td>0–10 min</td><td>Intro &amp; snabb runda</td></tr>
      <tr><td>10–35 min</td><td>Del 1 · Core Consulting Skills i praktiken</td></tr>
      <tr><td>35–60 min</td><td>Del 2 · Konsultmässighet – eget varumärke</td></tr>
      <tr><td>60–80 min</td><td>Del 3 · Många hattar – scenario</td></tr>
      <tr><td>80–90 min</td><td>Summering &amp; avslut</td></tr>
    </table>
    <button class="sbtn" onclick="go(1)" style="margin-top:1rem">Starta Del 1 →</button>
  </div>
  <div class="card">
    <div class="ctitle">Snabb icebreaker-runda (5 min)</div>
    <div class="csub">Gå runt i rummet – alla svarar på en fråga</div>
    <div class="qbox">
      <h4>Fråga till alla</h4>
      <p>"Vilken roll hade du inte förväntade dig att du skulle ha i din konsultroll – men som du ändå tagit?"</p>
      <p style="font-size:12px;color:#888;margin-top:.5rem">Ex: psykolog, projektledare, konfliktlösare, säljare, mentor… Alla har minst ett svar – det är meningen.</p>
    </div>
  </div>`;
}

function renderD1(isFac){
  const q=`
  <div class="card">
    <div class="ctitle">Del 1 · Core Consulting Skills i praktiken</div>
    <div class="csub">25 min totalt · Gruppdiskussion 12 min → Redovisning 8–10 min</div>
    <div class="qbox"><h4>Diskutera 1</h4><p>Vilka av dessa fyra är <em>svårast</em> i ert dagliga arbete – och varför?<br><span style="font-size:12px;opacity:.7">Kundförståelse &amp; problemlösning · Effektiv kommunikation · Professionalism &amp; ansvar · Värdeskapande</span></p></div>
    <div class="qbox"><h4>Diskutera 2</h4><p>Ge ett konkret exempel från ett riktigt uppdrag där en <em>soft skill</em> – inte teknisk kompetens – avgjorde utfallet.</p></div>
    <div class="qbox"><h4>Diskutera 3</h4><p>Hur kopplar ni era Core Skills till de tre benen: Uppdrag/Kund, Kompetens, Sälj/Marknad? Vilket ben glömmer man lätt?</p></div>
    <div class="qbox blue"><h4>Leverans</h4><p>Varje grupp delar: <strong>1 skill</strong> ni är starka på + <strong>1 skill</strong> ni vill bli bättre på</p></div>
  </div>`;
  if(!isFac) return q;
  return q+`
  <div class="card">
    <div class="ctitle">Seniora insikter – lyft vid behov</div>
    <div class="ins"><h4>Om diskussionen behöver bränsle</h4>
      <span class="ibadge">"Kommunikation är halva leveransen"</span>
      <span class="ibadge">Kunden köper trygghet, inte bara timmar</span>
      <span class="ibadge">Lyssnande är en teknisk skill</span>
      <span class="ibadge">Soft skills syns mest när det krisar</span>
      <span class="ibadge">"Rätt rapport i rätt tid > perfekt rapport för sent"</span>
    </div>
  </div>
  <div class="card">
    <div class="ctitle">Samla in från grupperna</div>
    ${groupInputs('d1')}
    <br><button class="sbtn" onclick="done[1]=true;go(2)">Gå till Del 2 →</button>
  </div>`;
}

function renderD2(isFac){
  const q=`
  <div class="card">
    <div class="ctitle">Del 2 · Konsultmässighet – eget varumärke</div>
    <div class="csub">25 min totalt · Gruppdiskussion 12 min → Redovisning 8–10 min</div>
    <div class="qbox"><h4>Diskutera 1</h4><p>Vilka konkreta beteenden/attityder skapar förtroende hos kunden? Tänk på ett uppdrag ni minns – vad var det som byggde relationen?</p></div>
    <div class="qbox"><h4>Diskutera 2</h4><p>Hur hanterar ni situationer där ni förväntas vara "mer än tekniker" – t.ex. coacha en stressad kund, hantera en intern konflikt hos kunden, eller sälja in nästa fas?</p></div>
    <div class="qbox"><h4>Diskutera 3</h4><p>Vad är den tydligaste skillnaden mot att jobba i linjeroll? Vad saknar ni – och vad uppskattar ni mest med konsultrollen?</p></div>
    <div class="qbox blue"><h4>Leverans</h4><p>Varje grupp delar: <strong>1 konkret tips</strong> eller exempel på bra konsultmässighet ni sett eller gjort</p></div>
  </div>`;
  if(!isFac) return q;
  return q+`
  <div class="card">
    <div class="ctitle">Seniora insikter – lyft vid behov</div>
    <div class="ins"><h4></h4>
      <span class="ibadge">"Ingen frågar vad du kostar om du levererar värde"</span>
      <span class="ibadge">Varumärket byggs i varje möte, varje mail</span>
      <span class="ibadge">Pålitlighet > Briljans</span>
      <span class="ibadge">"Hur du avslutar minns folk lika länge"</span>
      <span class="ibadge">Be om feedback – det är ett styrketecken</span>
      <span class="ibadge">Du ÄR Combitech hos kunden</span>
    </div>
  </div>
  <div class="card">
    <div class="ctitle">Samla in från grupperna</div>
    ${groupInputs('d2')}
    <br><button class="sbtn" onclick="done[2]=true;go(3)">Gå till Del 3 →</button>
  </div>`;
}

function renderD3(isFac){
  const q=`
  <div class="card">
    <div class="ctitle">Del 3 · Många hattar – scenario</div>
    <div class="csub">20 min · 10 min diskussion → 5 min redovisning (30–45 sek/grupp)</div>
    ${isFac?'<div class="fnote">Dela ut ett scenario per grupp – eller låt dem välja ett de känner igen sig i. Det finns inget rätt svar.</div>':''}
    <div class="qbox"><h4>Scenario A</h4><p>Du är inhyrd som IT-projektledare. Kunden ringer 10 min innan ett viktigt möte och vill "prata av sig". Mötet handlar om komplexa tekniska krav du förberett dig inför. Hur agerar du?</p></div>
    <div class="qbox"><h4>Scenario B</h4><p>Kunden ifrågasätter er leverans och pratar om att minska scopet – men problemet är att deras egna interna processer är trasiga, inte er lösning. Hur hanterar ni det utan att peka finger?</p></div>
    <div class="qbox"><h4>Scenario C</h4><p>Du hittar ett stort risk/problem hos kunden som ligger utanför ditt uppdrag. Det är inte din uppgift – men du är expert nog att se det. Vad gör du?</p></div>
    <div class="qbox blue"><h4>Diskutera i gruppen</h4><p>Hur använder ni Core Skills + konsultmässighet i scenariot? Välj <strong>en approach</strong> att dela – och varför just den.</p></div>
  </div>`;
  if(!isFac) return q;
  return q+`
  <div class="card">
    <div class="ctitle">Samla in från grupperna</div>
    ${groupInputs('d3')}
    <br><button class="sbtn" onclick="done[3]=true;go(4)">Gå till Avslut →</button>
  </div>`;
}

function renderAvsl(){
  return `
  <div class="fnote">Avslut (10 min) – Summera det bästa från grupperna. Avsluta med kärnbudskapet nedan.</div>
  <div class="card">
    <div class="ctitle">Kärnbudskap att avsluta med</div>
    <div class="qbox"><p>Konsultrollen är alltid <em>fler hattar än jobbtiteln</em>. Det är inte en nackdel – det är det som skapar verkligt värde.</p></div>
    <div class="qbox"><p>Konsultmässighet byggs inte på kurserna – den byggs i varje möte, varje mail, varje leverans. Och ni gör det redan.</p></div>
    <div class="qbox"><p>De bästa konsulterna är inte de som kan mest tekniskt – de är de som gör kunden trygg och vet när de ska vara psykolog, när de ska vara expert och när de ska ringa chefen.</p></div>
  </div>
  <div class="card">
    <div class="ctitle">Egna anteckningar / uppföljning</div>
    <textarea placeholder="Vad ska följas upp? Vad fastnade? Vem gör vad?" onchange="sv('avsl_notes',this.value)" style="min-height:90px">${ga('avsl_notes')}</textarea>
    <span class="stag" id="st_avsl_notes">Sparat ✓</span>
    <div style="margin-top:.75rem">
      <button class="nextbtn" onclick="setMode('sum')">Visa summering →</button>
    </div>
  </div>`;
}

function renderSum(){
  const parts=[
    {id:'d1',label:'Del 1 · Core Consulting Skills'},
    {id:'d2',label:'Del 2 · Konsultmässighet'},
    {id:'d3',label:'Del 3 · Scenario – Många hattar'},
  ];
  const hasAny=parts.some(p=>GROUPS.some(g=>ans[p.id+'_'+g]));
  if(!hasAny) return `<div class="card"><div class="empty">Inga svar insamlade ännu. Fyll i gruppernas svar under Facilitatorvyn.</div></div>`;
  let html='';
  parts.forEach(p=>{
    const filled=GROUPS.filter(g=>ans[p.id+'_'+g]);
    if(!filled.length) return;
    html+=`<div class="card"><div class="ctitle">${p.label}</div><div class="ansgrid">`;
    filled.forEach(g=>{html+=`<div class="ansitem"><div class="ansgrp">${g}</div>${ans[p.id+'_'+g]}</div>`;});
    html+=`</div></div>`;
  });
  if(ans['avsl_notes']) html+=`<div class="card"><div class="ctitle">Uppföljning</div><p style="font-size:13px;line-height:1.6">${ans['avsl_notes']}</p></div>`;
  return html;
}

render();
</script>
</body>
</html>
